<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>출산 D-day</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Gaegu&display=swap');

body {
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;

    /* 👉 이미지 파일명 기준 */
    background-image: url("baby.png");
    background-size: cover;
    background-position: center;
    font-family: 'Gaegu', cursive;
}

/* 반투명 카드 */
.card {
    background: rgba(255, 247, 230, 0.75);
    backdrop-filter: blur(3px);
    border-radius: 18px;
    padding: 22px 26px;
    text-align: center;
    box-shadow: 0 6px 12px rgba(0,0,0,0.12);
    width: 250px;
}

/* 제목 */
.title {
    font-size: 24px;
    color: #B45309;
    margin-bottom: 6px;
}

/* D-day 숫자 */
.dday {
    font-size: 30px;
    font-weight: bold;
    color: #FB7185;
}

/* 하단 문구 */
.sub {
    font-size: 18px;
    color: #9A3412;
    margin-top: 6px;
}
</style>
</head>

<body>

<div class="card">
    <div class="title">아기 만남까지 🍼</div>
    <div class="dday" id="dday">계산중...</div>
    <div class="sub">A little angel is on the way ✨</div>
</div>

<script>
// ⭐ URL에서 due 파라미터 읽기
const urlParams = new URLSearchParams(window.location.search);
const dueDate = urlParams.get('due') || "2026-04-17";  // URL 없으면 기본 날짜

function updateDday() {
    const today = new Date();
    const target = new Date(dueDate);
    const diff = target - today;
    const days = Math.ceil(diff / (1000 * 60 * 60 * 24));

    const text = days >= 0 
        ? `D-${days}` 
        : `출산 완료 🎉`;

    document.getElementById("dday").innerText = text;
}

updateDday();
setInterval(updateDday, 1000 * 60 * 60);
</script>

</body>
</html>
